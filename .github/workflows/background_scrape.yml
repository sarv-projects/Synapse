name: Background Scrape

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEO4J_URI:         ${{ secrets.NEO4J_URI }}
      NEO4J_USERNAME:    ${{ secrets.NEO4J_USERNAME }}
      NEO4J_PASSWORD:    ${{ secrets.NEO4J_PASSWORD }}
      NEO4J_DATABASE:    ${{ secrets.NEO4J_DATABASE }}
      GROQ_API_KEYS:     ${{ secrets.GROQ_API_KEYS }}
      POSTGRES_URL:      ${{ secrets.POSTGRES_URL }}
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      ZENROWS_API_KEY:   ${{ secrets.ZENROWS_API_KEY }}
      CORS_ORIGINS:      http://localhost:5173
      LOG_LEVEL:         INFO
      DEFAULT_DOMAIN:    ai

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run background scraper
        run: uv run python -m sync.background_scraper
