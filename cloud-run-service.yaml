apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: synapse-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Allocate extra CPU during container startup — cuts cold start ~40%
        run.googleapis.com/startup-cpu-boost: 'true'
        # Scale to zero when idle; max 3 instances under load
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '3'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/synapse-api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: '1'
              memory: 2Gi
          env:
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: NEO4J_URI
            - name: NEO4J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: NEO4J_USERNAME
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_DATABASE
              value: neo4j
            - name: GROQ_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: GROQ_API_KEYS
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: POSTGRES_URL
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: GOOGLE_CLOUD_PROJECT
            - name: CORS_ORIGINS
              value: "CORS_ORIGINS_PLACEHOLDER"
            - name: LOG_LEVEL
              value: INFO
            - name: DEFAULT_DOMAIN
              value: ai
            - name: HF_HUB_OFFLINE
              value: '1'
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /model_cache
